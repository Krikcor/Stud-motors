<h2>Supprimer un véhicule</h2>

{% if error %}
    <p style="color:red;">{{ error }}</p>
{% endif %}

<form method="post">
    {% csrf_token %}

    <label for="vehicle_id">ID du véhicule :</label>
    <input type="number" id="vehicle_id" name="vehicle_id" required>

    <button type="submit">Supprimer</button>
</form>

<a href="{% url 'pro_dashboard' %}">Retour au dashboard</a>
