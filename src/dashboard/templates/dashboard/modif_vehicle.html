{% extends "base.html" %}

{% block title %}Modifier un véhicule{% endblock %}

{% block content %}

<style>
.modify-vehicle-container {
    max-width: 700px;
    margin: 50px auto;
    padding: 20px;
}

.modify-card {
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* Titres et textes */
.modify-card h2 {
    text-align: center;
    margin-bottom: 30px;
    color: black;
}

.modify-card label,
.modify-card input,
.modify-card select,
.modify-card p {
    color: black;
    display: block;
    margin-bottom: 12px;
}

.modify-card input,
.modify-card select {
    width: 100%;
    padding: 8px 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

/* Boutons */
.modify-card button {
    padding: 12px 25px;
    font-size: 1.05rem;
    margin-top: 15px;
    width: 100%;
}

.return-link {
    display: block;
    margin-top: 20px;
    text-align: center;
}
</style>

<div class="modify-vehicle-container">

    <div class="modify-card">
        <h2>Modifier un véhicule</h2>

        {% if error %}
            <p style="color:red; text-align:center;">{{ error }}</p>
        {% endif %}

        <!-- Étape 1 : recherche -->
        {% if not vehicle %}
        <form method="post">
            {% csrf_token %}
            <label for="vehicle_id">ID du véhicule :</label>
            <input type="number" id="vehicle_id" name="vehicle_id" required>
            <button type="submit" class="btn btn-primary">Rechercher</button>
        </form>
        {% endif %}

        <!-- Étape 2 : formulaire de modification -->
        {% if vehicle %}
        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="save_modifications" value="{{ vehicle.id }}">

            <label>Marque :</label>
            <input type="text" name="brand" value="{{ vehicle.brand }}" required>

            <label>Modèle :</label>
            <input type="text" name="model" value="{{ vehicle.model }}" required>

            <label>Moteur :</label>
            <input type="text" name="engine" value="{{ vehicle.engine }}" required>

            <label>Année :</label>
            <input type="number" name="year" value="{{ vehicle.year }}" required>

            <label>Couleur :</label>
            <input type="text" name="color" value="{{ vehicle.color }}" required>

            <label>Kilométrage :</label>
            <input type="number" name="mileage" value="{{ vehicle.mileage }}" required>

            <label>Type :</label>
            <select name="vehicle_type" required>
                <option value="purchase" {% if vehicle.vehicle_type == "purchase" %}selected{% endif %}>Achat</option>
                <option value="rental" {% if vehicle.vehicle_type == "rental" %}selected{% endif %}>Location</option>
            </select>

            <label>Prix :</label>
            <input type="number" step="0.01" name="price" value="{{ vehicle.price }}" required>

            <button type="submit" class="btn btn-primary">Enregistrer les modifications</button>
        </form>
        {% endif %}

        <a href="{% url 'pro_dashboard' %}" class="btn btn-secondary return-link">
            Retour vers le dashboard
        </a>

    </div>
</div>

{% endblock %}
