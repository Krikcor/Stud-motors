{% extends "base.html" %}

{% block title %}Connexion - M-Motors{% endblock %}

{% block content %}
<h1>Connexion</h1>

<form method="post">
    {% csrf_token %}

    <label for="username">Nom d'utilisateur :</label>
    <input type="text" name="username" id="username" required autofocus autocomplete="username" placeholder="Entrez votre nom d'utilisateur"><br><br>

    <label for="password">Mot de passe :</label>
    <input type="password" name="password" id="password" required autocomplete="current-password" placeholder="Entrez votre mot de passe"><br><br>

    <button type="submit">Se connecter</button>
</form>

<p>
    <a href="{% url 'register' %}">Créer un compte</a> |
    <a href="{% url 'password_reset' %}">Mot de passe oublié ?</a>
</p>

{% endblock %}
